apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fluxer-ingress-from-ingress-controller
spec:
  podSelector:
    matchLabels:
      app: fluxer-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
