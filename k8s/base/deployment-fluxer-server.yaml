apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluxer-server
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: fluxer-server
  template:
    metadata:
      labels:
        app: fluxer-server
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        fsGroup: 10001
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fluxer-server
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fluxer-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: fluxer-server
          image: fluxer-server:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: fluxer-server
            - secretRef:
                name: fluxer-env
          env:
            - name: FLUXER_CONFIG
              value: /usr/src/app/config/config.json
          volumeMounts:
            - name: config
              mountPath: /usr/src/app/config
              readOnly: true
            - name: data
              mountPath: /usr/src/app/data
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /_ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /_health
              port: http
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
      volumes:
        - name: config
          configMap:
            name: fluxer-config
        - name: data
          persistentVolumeClaim:
            claimName: fluxer-data
        - name: tmp
          emptyDir: {}
