apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fluxer.fullname" . }}
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fluxer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fluxer.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: fluxer-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "fluxer.fullname" . }}
            - secretRef:
                name: {{ include "fluxer.fullname" . }}-env
          env:
            - name: FLUXER_CONFIG
              value: /usr/src/app/config/config.json
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /usr/src/app/config
              readOnly: true
            - name: data
              mountPath: /usr/src/app/data
      volumes:
        - name: config
          secret:
            secretName: {{ include "fluxer.fullname" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "fluxer.fullname" . }}-data
