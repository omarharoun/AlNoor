{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fluxer.fullname" . }}-nats
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "fluxer.fullname" . }}-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: nats
      {{- include "fluxer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nats
        {{- include "fluxer.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          args:
            - -js
            - --auth
            - $(NATS_AUTH_TOKEN)
          env:
            - name: NATS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fluxer.fullname" . }}-env
                  key: FLUXER_CONFIG__SERVICES__NATS__AUTH_TOKEN
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.nats.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fluxer.fullname" . }}-nats
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: nats
    {{- include "fluxer.selectorLabels" . | nindent 4 }}
  ports:
    - name: client
      port: 4222
      targetPort: 4222
{{- end }}
