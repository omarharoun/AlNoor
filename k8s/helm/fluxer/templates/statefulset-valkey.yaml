{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fluxer.fullname" . }}-valkey
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "fluxer.fullname" . }}-valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: valkey
      {{- include "fluxer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: valkey
        {{- include "fluxer.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
          args: ["valkey-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fluxer.fullname" . }}-valkey
  labels:
    {{- include "fluxer.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: valkey
    {{- include "fluxer.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
