apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-ingress-from-fluxer
  namespace: alnoor
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fluxer-server
      ports:
        - protocol: TCP
          port: 4222
